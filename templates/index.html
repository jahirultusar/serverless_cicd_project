<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote Generator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            max-width: 640px;
            width: 100%;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            text-align: center;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: #1a1a1a;
        }

        p.subtitle {
            color: #666;
            margin-bottom: 32px;
            font-size: 14px;
        }

        .quote-box {
            background-color: #f9f9f9;
            border-left: 4px solid #4a90e2;
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 24px;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .quote-text {
            font-size: 18px;
            line-height: 1.6;
            color: #333;
            font-style: italic;
            margin-bottom: 12px;
        }

        .quote-author {
            font-size: 14px;
            color: #888;
            font-weight: bold;
        }

        button {
            padding: 12px 32px;
            background-color: #4a90e2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #357abd;
        }

        button:disabled {
            background-color: #aaa;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Quote Generator</h1>
        <p class="subtitle">Click the button to get an inspiring quote.</p>

        <div class="quote-box">
            <p class="quote-text" id="quote-text">Click the button to get started.</p>
            <p class="quote-author" id="quote-author"></p>
        </div>

        <button id="btn" onclick="getQuote()">Get a quote</button>
    </div>

    <script>
        async function getQuote() {
            const btn = document.getElementById("btn");
            const quoteText = document.getElementById("quote-text");
            const quoteAuthor = document.getElementById("quote-author");

            btn.disabled = true;
            btn.textContent = "Loading...";

            try {
                const res = await fetch("/quote");
                const data = await res.json();
                quoteText.textContent = `"${data.quote}"`;
                quoteAuthor.textContent = `— ${data.author}`;
            } catch (err) {
                quoteText.textContent = "Something went wrong. Please try again.";
                quoteAuthor.textContent = "";
            } finally {
                btn.disabled = false;
                btn.textContent = "Get another quote";
            }
        }
    </script>
</body>
</html>
